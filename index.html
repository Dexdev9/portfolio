<style>
  :root{
    --accent:#e11d2a;
    --ink:#11161d;
    --paper:#fbfcff;
    --muted:#5b6675;
    --line:rgba(17,22,29,.10);
    --mono:ui-monospace,SFMono-Regular,Menlo,"Cascadia Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#aed4ff;font-family:var(--sans);color:var(--ink);
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
  canvas{display:block}
  #app{position:fixed;inset:0}

  /* ---- soft vignette over the 3D scene ---- */
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    box-shadow:inset 0 0 220px rgba(20,40,70,.28);
    background:radial-gradient(120% 120% at 50% 8%,transparent 55%,rgba(20,40,70,.12) 100%)}

  /* ---- top HUD ---- */
  .hud{position:fixed;z-index:20;top:18px;left:18px;display:flex;flex-direction:column;gap:2px;
    pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.18)}
  .hud .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:#fff;opacity:.92}
  .hud .name{font-size:23px;font-weight:800;letter-spacing:-.01em;color:#fff;line-height:1.05}
  .hud .name b{color:#ffd2d4}

  .topright{position:fixed;z-index:20;top:16px;right:16px;display:flex;gap:8px}
  .pill{pointer-events:auto;cursor:pointer;border:0;font-family:var(--mono);font-size:12px;letter-spacing:.04em;
    background:rgba(255,255,255,.92);color:var(--ink);padding:9px 13px;border-radius:999px;
    box-shadow:0 6px 18px rgba(20,40,70,.18);display:flex;align-items:center;gap:7px;transition:transform .12s,background .12s}
  .pill:hover{transform:translateY(-1px);background:#fff}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}

  /* ---- speed / hint ---- */
  .ticker{position:fixed;z-index:18;left:18px;bottom:18px;font-family:var(--mono);font-size:11px;
    color:#fff;opacity:.9;text-shadow:0 1px 2px rgba(0,0,0,.25);pointer-events:none;line-height:1.6}
  .ticker b{color:#ffd2d4}

  /* ---- minimap ---- */
  .minimap{position:fixed;z-index:18;right:16px;bottom:16px;width:148px;height:148px;border-radius:16px;
    background:rgba(255,255,255,.14);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.35);
    box-shadow:0 10px 28px rgba(20,40,70,.25);overflow:hidden}
  .minimap canvas{width:100%;height:100%}
  .minimap .mlabel{position:absolute;top:7px;left:10px;font-family:var(--mono);font-size:9px;letter-spacing:.18em;
